<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เกมคณิตคิดสนุก</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Sarabun', sans-serif; }
        #bg-video { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); z-index: -1; }
        #hand-pointer { position: absolute; width: 40px; height: 40px; background: #ffeb3b; border-radius: 50%; z-index: 999; pointer-events: none; border: 3px solid white; box-shadow: 0 0 15px orange; }
        
        #start-screen { 
    /* ... ส่วนประกอบอื่นๆ ... */
    background-image: url('https://raw.githubusercontent.com/noononth57-rgb/index.html/main/ChatGPT%20Image%2023%20%E0%B8%A1%E0%B8%B4.%E0%B8%A2.%202569%2021_08_39%20(1).png'); 
    background-size: cover; 
    background-position: center;
    /* ... */}
        
        .btn { padding: 20px 40px; font-size: 24px; cursor: pointer; margin: 10px; border-radius: 20px; border: none; background: #4caf50; color: white; }
        
        #game-ui { display: none; position: absolute; top: 20px; left: 20px; color: white; font-size: 30px; font-weight: bold; z-index: 5; }
        .choice-btn { position: absolute; bottom: 20%; width: 200px; height: 200px; border-radius: 50%; font-size: 50px; border: none; color: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #btn-left { left: 20%; background: #4caf50; }
        #btn-right { right: 20%; background: #2196f3; }
    </style>
</head>
<body>
    <video id="bg-video" autoplay playsinline muted></video>
    <div id="hand-pointer"></div>

    <div id="start-screen">
        <h1 style="color: white; text-shadow: 2px 2px 5px black;">เก่งคณิต คิดสนุก</h1>
        <button class="btn" onclick="startCamera()">📷 เปิดกล้อง</button>
        <button class="btn" id="start-btn" disabled onclick="beginGame()">▶️ เริ่มเกม</button>
    </div>

    <div id="game-ui">
        <div>คะแนน: <span id="score">0</span></div>
        <div>เวลา: <span id="timer">90</span></div>
    </div>

    <button class="choice-btn" id="btn-left" style="left: 10%;">16</button>
    <button class="choice-btn" id="btn-right" style="right: 10%;">14</button>

    <script>
        let score = 0, timer = 90;
        const videoElement = document.getElementById('bg-video');
        const pointer = document.getElementById('hand-pointer');

        function startCamera() {
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0][9];
                    pointer.style.left = (1 - lm.x) * window.innerWidth + 'px';
                    pointer.style.top = lm.y * window.innerHeight + 'px';
                }
            });
            const camera = new Camera(videoElement, { onFrame: async () => await hands.send({ image: videoElement }), width: 1280, height: 720 });
            camera.start().then(() => document.getElementById('start-btn').disabled = false);
        }

        function beginGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            setInterval(() => {
                timer--;
                document.getElementById('timer').innerText = timer;
                if(timer <= 0) alert("หมดเวลา! คะแนนของคุณคือ: " + score);
            }, 1000);
        }
    </script>
</body>
</html>
