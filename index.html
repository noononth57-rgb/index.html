<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คณิตศาสตร์มหัศจรรย์ - เซต ม.4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
        body { margin: 0; font-family: 'Sarabun', sans-serif; background: #222; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #game-container { width: 100%; height: 100%; background: radial-gradient(circle, #4a148c, #1a0b2e); position: relative; color: white; }
        
        .ui-top { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; }
        #pause-btn { position: absolute; top: 20px; right: 20px; padding: 15px 30px; font-size: 20px; cursor: pointer; background: #ffeb3b; border: none; border-radius: 15px; font-weight: bold; }
        
        .question-box { background: rgba(255, 255, 255, 0.95); color: #333; padding: 50px; border-radius: 40px; font-size: 60px; font-weight: bold; position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        
        .btn-choice { width: 220px; height: 220px; border-radius: 50%; position: absolute; bottom: 15%; font-size: 80px; cursor: pointer; border: 8px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; transition: transform 0.2s; }
        .btn-choice:active { transform: scale(0.9); }
        #btn-left { background: #4caf50; left: 15%; }
        #btn-right { background: #f44336; right: 15%; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="ui-top">คะแนน: <span id="score">0</span></div>
        <button id="pause-btn" onclick="togglePause()">⏸️ หยุดเกม</button>
        
        <div class="question-box" id="questionText">กำลังโหลด...</div>
        
        <button class="btn-choice" id="btn-left" onclick="processAnswer('left')">∈</button>
        <button class="btn-choice" id="btn-right" onclick="processAnswer('right')">∉</button>
    </div>

    <!-- ระบบเสียง -->
    <audio id="bgmGame" src="https://assets.mixkit.co/active_storage/sfx/167/167-preview.mp3" loop></audio>
    <audio id="correctSound" src="https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3"></audio>
    <audio id="wrongSound" src="https://assets.mixkit.co/active_storage/sfx/2006/2006-preview.mp3"></audio>
    <audio id="pauseSound" src="https://assets.mixkit.co/active_storage/sfx/2573/2573-preview.mp3"></audio>

    <script>
        let score = 0, isPaused = false, currentQuestion = null;
        let usedQuestions = new Set();

        const bgm = document.getElementById('bgmGame');

        function generateQuestion() {
            const pool = ['💎', '🧱', '🗡️', '🍎', '🏹', '🦊', '🐱', '🍕', '🚀', '👾', '🔺', '⭐', '☀️', 'x', 'y', 'z', '1', '5', '9'];
            let elements = [...pool].sort(() => Math.random() - 0.5).slice(0, 5);
            let setStr = `{ ${elements.join(', ')} }`;
            
            if(usedQuestions.has(setStr)) return generateQuestion();
            usedQuestions.add(setStr);

            let isCorrect = Math.random() > 0.5;
            let target = isCorrect ? elements[0] : '🌀';
            return { q: `${target} <br> .......... <br> ${setStr}`, a: isCorrect ? '∈' : '∉' };
        }

        function processAnswer(side) {
            if(isPaused) return;
            let ans = (side === 'left') ? '∈' : '∉';
            if(ans === currentQuestion.a) {
                score += 10;
                document.getElementById('correctSound').play();
            } else {
                document.getElementById('wrongSound').play();
            }
            document.getElementById('score').innerText = score;
            nextQuestion();
        }

        function nextQuestion() {
            currentQuestion = generateQuestion();
            document.getElementById('questionText').innerHTML = currentQuestion.q;
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pauseSound').play();
            if(isPaused) {
                bgm.pause();
                document.getElementById('pause-btn').innerText = "▶️ เล่นต่อ";
            } else {
                bgm.play();
                document.getElementById('pause-btn').innerText = "⏸️ หยุดเกม";
            }
        }

        // เริ่มเกมอัตโนมัติ
        window.onload = () => {
            bgm.volume = 0.5;
            bgm.play();
            nextQuestion();
        };
    </script>
</body>
</html>
