<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เก่งคณิต คิดสนุก - เรื่องเซต</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.1/hands.js" crossorigin="anonymous"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');

        * { box-sizing: border-box; font-family: 'Sarabun', sans-serif; user-select: none; }
        body { margin: 0; overflow: hidden; background-color: #222; color: #333; }

        /* พื้นหลังกล้อง WebCam เต็มจอ (กลับด้านให้เหมือนกระจกเงาเล่นง่าย) */
        #bg-video { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; transform: scaleX(-1); }
        
        /* จุดเลเซอร์ชี้ตำแหน่งฝ่ามือตามการตรวจจับ of AI */
        #hand-pointer { position: absolute; width: 35px; height: 35px; background: rgba(255, 235, 59, 0.8); border: 3px solid #fff; border-radius: 50%; pointer-events: none; z-index: 999; display: none; transform: translate(-50%, -50%); box-shadow: 0 0 20px #ffeb3b, inset 0 0 8px #fff; }

        /* --- หน้าเริ่มเกม --- */
        #start-screen { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-image: url("https://raw.githubusercontent.com/noononth57-rgb/index.html/main/ChatGPT%20Image%2023%20%E0%B8%A1%E0%B8%B4.%E0%B8%A2.%202569%2021_08_39%20(1).png");
            background-size: cover; 
            background-position: center;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
        }
        
        /* สไตล์สำหรับเมนูปุ่มกดที่เป็นรูปภาพ (ปรับให้ล็อกตำแหน่งลงมาทับกรอบไม้ของพื้นหลังพอดี) */
        .menu-container { 
            display: flex; 
            gap: 60px; /* ระยะความห่างซ้าย-ขวา ระหว่าง 2 ปุ่ม */
            justify-content: center; 
            align-items: center; 
            position: absolute;
            top: 20%; /* ✨ ดันตำแหน่งปุ่มลงมาตรงช่องกรอบไม้พอดี (ครูสามารถปรับเพิ่ม/ลด % ตรงนี้เพื่อเลื่อนขึ้นลงได้ครับ) */
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 110;
        }
        .menu-btn-img { 
            width: 175px; /* ✨ ปรับขนาดปุ่มให้พอดีกับกรอบไม้บนรูปพื้นหลัง (ปรับขนาดได้ระหว่าง 160px - 190px ตามใจชอบครับ) */
            height: auto; 
            cursor: pointer; 
            transition: transform 0.1s, filter 0.1s;
            filter: drop-shadow(0px 8px 0px rgba(0,0,0,0.3)); 
        }
        .menu-btn-img:hover { 
            transform: scale(1.08); 
        }
        .menu-btn-img:active { 
            transform: scale(0.95); 
            filter: drop-shadow(0px 3px 0px rgba(0,0,0,0.3));
        }

        /* หน้าต่างป๊อปอัพควบคุมการเปิดกล้อง */
        #how-to-modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 150; justify-content: center; align-items: center; }
        .modal-card { background: white; border-radius: 30px; width: 550px; padding: 40px; box-shadow: 0 15px 30px rgba(0,0,0,0.3); text-align: center; position: relative; } 
        .modal-title { font-size: 2.3rem; font-weight: bold; color: #4a148c; margin-bottom: 20px; }
        .modal-list { text-align: left; font-size: 1.3rem; line-height: 1.8; margin-bottom: 30px; color: #4b5563; }
        
        /* ปุ่มกากบาทปิดหน้าต่างป๊อปอัพ */
        .close-modal-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            background: none;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
            line-height: 1;
        }
        .close-modal-btn:hover {
            color: #ef4444; 
            transform: scale(1.15);
        }

        .modal-btn-group { display: flex; justify-content: center; gap: 20px; }
        .modal-btn { padding: 15px 35px; font-size: 1.3rem; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; color: white; box-shadow: 0 5px 0 rgba(0,0,0,0.2); }
        .btn-camera-init { background: #0288d1; }
        .btn-game-start { background: #4caf50; opacity: 0.5; pointer-events: none; } 

        /* --- หน้าจอหลักระหว่างเล่นเกม --- */
        #game-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        
        /* ไอคอนสถิติด้านบนซ้ายแบบตลับแคปซูล */
        .top-left-ui { position: absolute; top: 25px; left: 25px; display: flex; gap: 15px; }
        .stat-pill { background: #fffdf0; padding: 10px 22px; border-radius: 30px; font-size: 22px; font-weight: bold; display: flex; align-items: center; gap: 10px; box-shadow: 0 6px 12px rgba(0,0,0,0.15); border: 1px solid #ffeb3b; }
        
        /* ปุ่มหน้าแรกและปุ่มหยุดด้านบนขวา */
        .top-right-ui { position: absolute; top: 25px; right: 25px; display: flex; gap: 15px; }
        .icon-btn { background: #fffdf0; border: 1px solid #ccc; width: 55px; height: 55px; border-radius: 15px; font-size: 24px; cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.15); display: flex; justify-content: center; align-items: center; }

        /* กล่องข้อความโจทย์ขนาดใหญ่ตรงกลางด้านบน */
        .question-box { background: white; padding: 35px 70px; border-radius: 25px; font-size: 55px; font-weight: bold; color: #2d2d6b; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: absolute; top: 15%; left: 50%; transform: translateX(-50%); white-space: nowrap; text-align: center; min-width: 450px; }
        .question-box span { color: #29b6f6; }

        /* ปุ่มคำตอบวงกลมขนาดใหญ่ฝั่งซ้ายและขวาด้านล่าง */
        .choice-btn { width: 180px; height: 180px; border-radius: 50%; border: none; font-size: 65px; font-weight: bold; color: white; position: absolute; bottom: 15%; box-shadow: 0 12px 24px rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center; transition: transform 0.2s; }
        .choice-btn.ai-hovered { transform: scale(1.18); box-shadow: 0 0 35px #ffeb3b; }
        .btn-green { background: radial-gradient(circle at 30% 30%, #66bb6a, #4caf50); left: 10%; }
        .btn-blue { background: radial-gradient(circle at 30% 30%, #4fc3f7, #0288d1); right: 10%; }

        /* กล่องของขวัญไอเทมลับสุ่มเกิด */
        #mystery-box { position: absolute; font-size: 65px; display: none; cursor: pointer; z-index: 50; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }

        /* ตัวแจ้งเตือนตอบถูก/ผิดตรงกลางจอ */
        #feedback-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 180px; display: none; z-index: 90; text-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* --- หน้าจอสรุปคะแนนผู้เล่น --- */
        #end-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); color: white; flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
        .end-card { background: #ffffff; color: #333; padding: 45px; border-radius: 30px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5); width: 450px; }
        .restart-btn { background: #ffeb3b; color: #4a148c; border: none; padding: 15px 45px; font-size: 1.6rem; font-weight: bold; border-radius: 30px; cursor: pointer; box-shadow: 0 6px 0 #f57c00; margin-top: 25px; transition: 0.1s; }
        .restart-btn:active { transform: translateY(6px); box-shadow: none; }
    </style>
</head>
<body>

    <video id="bg-video" autoplay playsinline muted style="display:none;"></video>
    <div id="hand-pointer"></div>

    <div id="start-screen">
        <div class="menu-container">
            <img src="4.png" class="menu-btn-img" onclick="openInstruction('membership')" alt="การเป็นสมาชิก">
            
            <img src="3.png" class="menu-btn-img" onclick="openInstruction('subset')" alt="การเป็นสับเซต">
        </div>
    </div>

    <div id="how-to-modal">
        <div class="modal-card">
            <button class="close-modal-btn" onclick="closeModal()">✖</button>
            
            <div class="modal-title">เตรียมความพร้อม 🎮</div>
            <div class="modal-list">
                <b>1. โหมดการเล่น:</b> <span id="selected-mode-text" style="color:#0288d1; font-weight:bold;"></span><br>
                <b>2. กติกาการตอบ:</b> ยกฝ่ามือค้างไว้บนปุ่มตัวเลือกเพื่อตอบโจทย์<br>
                <b>3. โบนัสพิเศษ:</b> เลื่อนมือไปเปิดกล่องของขวัญ 🎁 สุ่มรับ +20 คะแนน
            </div>
            <div class="modal-btn-group">
                <button class="modal-btn btn-camera-init" id="cam-btn" onclick="initAIAndCamera()">📷 เปิดใช้งานกล้อง</button>
                <button class="modal-btn btn-game-start" id="start-btn" onclick="realStartGame()">▶️ เริ่มเข้าสู่เกม</button>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <div class="top-left-ui">
            <div class="stat-pill">🪙 คะแนน: <span id="scoreDisplay">0</span></div>
            <div class="stat-pill">⏰ เวลา: <span id="timeDisplay">90</span></div>
            <div class="stat-pill">📝 ข้อที่: <span id="qCountDisplay">1</span>/100</div>
        </div>
        <div class="top-right-ui">
            <div class="icon-btn">⏸️</div>
            <button class="icon-btn" onclick="location.reload()">🏠</button>
        </div>
        
        <div id="mystery-box">🎁</div>
        <div class="question-box" id="questionText">A _ B <span>?</span></div>
        
        <button class="choice-btn btn-green" id="btn-left">∈</button>
        <button class="choice-btn btn-blue" id="btn-right">∉</button>
        
        <div id="feedback-overlay">✅</div>
        <div style="position: absolute; bottom: 15px; width: 100%; text-align: center; color: white; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); font-size: 16px;">โดย เพจคุณครูใจดี</div>
    </div>

    <div id="end-screen">
        <div class="end-card">
            <h2 style="font-size: 2.5rem; margin-top:0; color:#4a148c;">สิ้นสุดการท้าทาย!</h2>
            <p style="font-size: 1.4rem; margin: 10px 0;">ตอบโจทย์ไปทั้งหมด: <span id="finalQuestions" style="color:#e91e63; font-weight:bold;">0</span> ข้อ</p>
            <p style="font-size: 1.6rem; margin: 10px 0;">คะแนนรวมสะสม: <span id="finalScore" style="color: #4caf50; font-weight: bold; font-size: 3.2rem;">0</span></p>
            <button class="restart-btn" onclick="location.reload()">ย้อนกลับไปหน้าแรก</button>
        </div>
    </div>

    <audio id="correctSound" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" preload="auto"></audio>
    <audio id="wrongSound" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3" preload="auto"></audio>
